<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 175" width="160" height="175">
  <!-- outer circle -->
  <circle cx="80" cy="90" r="72" fill="#26215C" opacity="0.1"/>
  <circle cx="80" cy="90" r="72" fill="none" stroke="#534AB7" stroke-width="2"/>

  <!-- ears with mint inner -->
  <circle cx="34" cy="30" r="17" fill="#534AB7"/>
  <circle cx="126" cy="30" r="17" fill="#534AB7"/>
  <circle cx="34" cy="30" r="9" fill="#1D9E75" opacity="0.75"/>
  <circle cx="126" cy="30" r="9" fill="#1D9E75" opacity="0.75"/>

  <!-- amorphous face shadow — no round egg -->
  <path d="M46 130 Q52 96 58 86 Q80 78 102 86 Q108 96 114 130 Q90 138 80 136 Q66 138 46 130Z" fill="#26215C" opacity="0.2"/>

  <!-- hat brim -->
  <ellipse cx="80" cy="72" rx="55" ry="10" fill="#26215C"/>
  <!-- hat crown -->
  <rect x="30" y="36" width="100" height="38" rx="6" fill="#26215C"/>
  <!-- mint band -->
  <rect x="30" y="62" width="100" height="8" fill="#1D9E75" opacity="0.45"/>

  <!-- glasses — left -->
  <rect x="46" y="80" width="24" height="17" rx="6" fill="#534AB7" opacity="0.15" stroke="#AFA9EC" stroke-width="2.2"/>
  <!-- glasses — right -->
  <rect x="90" y="80" width="24" height="17" rx="6" fill="#534AB7" opacity="0.15" stroke="#AFA9EC" stroke-width="2.2"/>
  <!-- mint lens flares -->
  <line x1="50" y1="83" x2="57" y2="84" stroke="#5DCAA5" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
  <line x1="94" y1="83" x2="101" y2="84" stroke="#5DCAA5" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
  <!-- bridge -->
  <line x1="70" y1="88" x2="90" y2="88" stroke="#AFA9EC" stroke-width="2"/>
  <!-- temples -->
  <line x1="46" y1="88" x2="34" y2="85" stroke="#AFA9EC" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="114" y1="88" x2="126" y2="85" stroke="#AFA9EC" stroke-width="1.8" stroke-linecap="round"/>
  <!-- ghost pupils -->
  <circle cx="58" cy="88" r="3.5" fill="#26215C" opacity="0.4"/>
  <circle cx="102" cy="88" r="3.5" fill="#26215C" opacity="0.4"/>
</svg>
